              - text: available to customize a project to your exact use case and needs.
            - paragraph [ref=e273]: "Some highlights include:"
            - list [ref=e274]:
              - listitem [ref=e275]:
                - strong [ref=e276]:
                  - link "Islands" [ref=e277] [cursor=pointer]:
                    - /url: /en/concepts/islands/
                  - text: ":"
                - text: A component-based web architecture optimized for content-driven websites.
              - listitem [ref=e278]:
                - strong [ref=e279]:
                  - link "UI-agnostic" [ref=e280] [cursor=pointer]:
                    - /url: /en/guides/framework-components/
                  - text: ":"
                - text: Supports React, Preact, Svelte, Vue, Solid, HTMX, web components, and more.
              - listitem [ref=e281]:
                - strong [ref=e282]:
                  - link "Server-first" [ref=e283] [cursor=pointer]:
                    - /url: /en/guides/on-demand-rendering/
                  - text: ":"
                - text: Moves expensive rendering off of your visitors’ devices.
              - listitem [ref=e284]:
                - strong [ref=e285]:
                  - link "Zero JS, by default" [ref=e286] [cursor=pointer]:
                    - /url: /en/basics/astro-components/
                  - text: ":"
                - text: Less client-side JavaScript to slow your site down.
              - listitem [ref=e287]:
                - strong [ref=e288]:
                  - link "Content collections" [ref=e289] [cursor=pointer]:
                    - /url: /en/guides/content-collections/
                  - text: ":"
                - text: Organize, validate, and provide TypeScript type-safety for your Markdown content.
              - listitem [ref=e290]:
                - strong [ref=e291]:
                  - link "Customizable" [ref=e292] [cursor=pointer]:
                    - /url: /en/guides/integrations/
                  - text: ":"
                - text: Partytown, MDX, and hundreds of integrations to choose from.
            - generic [ref=e293]:
              - heading "Design Principles" [level=2] [ref=e294]
              - link "Section titled “Design Principles”" [ref=e295] [cursor=pointer]:
                - /url: "#design-principles"
                - img [ref=e297]
                - generic [ref=e299]: Section titled “Design Principles”
            - paragraph [ref=e300]: Here are five core design principles to help explain why we built Astro, the problems that it exists to solve, and why Astro may be the best choice for your project or team.
            - paragraph [ref=e301]: Astro is…
            - list [ref=e302]:
              - listitem [ref=e303]:
                - strong [ref=e304]:
                  - link "Content-driven" [ref=e305] [cursor=pointer]:
                    - /url: "#content-driven"
                  - text: ":"
                - text: Astro was designed to showcase your content.
              - listitem [ref=e306]:
                - strong [ref=e307]:
                  - link "Server-first" [ref=e308] [cursor=pointer]:
                    - /url: "#server-first"
                  - text: ":"
                - text: Websites run faster when they render HTML on the server.
              - listitem [ref=e309]:
                - strong [ref=e310]:
                  - link "Fast by default" [ref=e311] [cursor=pointer]:
                    - /url: "#fast-by-default"
                  - text: ":"
                - text: It should be impossible to build a slow website in Astro.
              - listitem [ref=e312]:
                - strong [ref=e313]:
                  - link "Easy to use" [ref=e314] [cursor=pointer]:
                    - /url: "#easy-to-use"
                  - text: ":"
                - text: You don’t need to be an expert to build something with Astro.
              - listitem [ref=e315]:
                - strong [ref=e316]:
                  - link "Developer-focused" [ref=e317] [cursor=pointer]:
                    - /url: "#developer-focused"
                  - text: ":"
                - text: You should have the resources you need to be successful.
            - generic [ref=e318]:
              - heading "Content-driven" [level=3] [ref=e319]
              - link "Section titled “Content-driven”" [ref=e320] [cursor=pointer]:
                - /url: "#content-driven"
                - img [ref=e322]
                - generic [ref=e324]: Section titled “Content-driven”
            - paragraph [ref=e325]:
              - strong [ref=e326]: Astro was designed for building content-rich websites.
              - text: This includes marketing sites, publishing sites, documentation sites, blogs, portfolios, landing pages, community sites, and e-commerce sites. If you have content to show, it needs to reach your reader quickly.
            - paragraph [ref=e327]:
              - text: By contrast, most modern web frameworks were designed for building
              - emphasis [ref=e328]: web applications
              - text: ". These frameworks excel at building more complex, application-like experiences in the browser: logged-in admin dashboards, inboxes, social networks, todo lists, and even native-like applications like"
              - link "Figma" [ref=e329] [cursor=pointer]:
                - /url: https://figma.com/
              - text: and
              - link "Ping" [ref=e330] [cursor=pointer]:
                - /url: https://ping.gg/
              - text: . However with that complexity, they can struggle to provide great performance when delivering your content.
            - paragraph [ref=e331]:
              - text: Astro’s focus on content from its beginnings as a static site builder have allowed Astro to
              - strong [ref=e332]: sensibly scale up to performant, powerful, dynamic web applications
              - text: that still respect your content and your audience. Astro’s unique focus on content lets Astro make tradeoffs and deliver unmatched performance features that wouldn’t make sense for more application-focused web frameworks to implement.
            - generic [ref=e333]:
              - heading "Server-first" [level=3] [ref=e334]
              - link "Section titled “Server-first”" [ref=e335] [cursor=pointer]:
                - /url: "#server-first"
                - img [ref=e337]
                - generic [ref=e339]: Section titled “Server-first”
            - paragraph [ref=e340]:
              - strong [ref=e341]: Astro leverages server rendering over client-side rendering in the browser as much as possible.
              - text: This is the same approach that traditional server-side frameworks -- PHP, WordPress, Laravel, Ruby on Rails, etc. -- have been using for decades. But you don’t need to learn a second server-side language to unlock it. With Astro, everything is still just HTML, CSS, and JavaScript (or TypeScript, if you prefer).
            - paragraph [ref=e342]:
              - text: This approach stands in contrast to other modern JavaScript web frameworks like Next.js, SvelteKit, Nuxt, Remix, and others. These frameworks were built for client-side rendering of your entire website and include server-side rendering mainly to address performance concerns. This approach has been dubbed the
              - strong [ref=e343]: Single-Page App (SPA)
              - text: ", in contrast with Astro’s"
              - strong [ref=e344]: Multi-Page App (MPA)
              - text: approach.
            - paragraph [ref=e345]:
              - text: The SPA model has its benefits. However, these come at the expense of additional complexity and performance tradeoffs. These tradeoffs harm page performance -- critical metrics like
              - link "Time to Interactive (TTI)" [ref=e346] [cursor=pointer]:
                - /url: https://web.dev/interactive/
              - text: "-- which doesn’t make much sense for content-focused websites where first-load performance is essential."
            - paragraph [ref=e347]: Astro’s server-first approach allows you to opt in to client-side rendering only if, and exactly as, necessary. You can choose to add UI framework components that run on the client. You can take advantage of Astro’s view transitions router for finer control over select page transitions and animations. Astro’s server-first rendering, either pre-rendered or on-demand, provides performant defaults that you can enhance and extend.
            - generic [ref=e348]:
              - heading "Fast by default" [level=3] [ref=e349]
              - link "Section titled “Fast by default”" [ref=e350] [cursor=pointer]:
                - /url: "#fast-by-default"
                - img [ref=e352]
                - generic [ref=e354]: Section titled “Fast by default”
            - paragraph [ref=e355]:
              - text: Good performance is always important, but it is
              - emphasis [ref=e356]: especially
              - text: "critical for websites whose success depends on displaying your content. It has been well-proven that poor performance loses you engagement, conversions, and money. For example:"
            - list [ref=e357]:
              - listitem [ref=e358]:
                - text: Every 100ms faster → 1% more conversions (
                - link "Mobify" [ref=e359] [cursor=pointer]:
                  - /url: https://web.dev/why-speed-matters/
                - text: ", earning +$380,000/yr)"
              - listitem [ref=e360]:
                - text: 50% faster → 12% more sales (
                - link "AutoAnything" [ref=e361] [cursor=pointer]:
                  - /url: https://www.digitalcommerce360.com/2010/08/19/web-accelerator-revs-conversion-and-sales-autoanything/
                - text: )
              - listitem [ref=e362]:
                - text: 20% faster → 10% more conversions (
                - link "Furniture Village" [ref=e363] [cursor=pointer]:
                  - /url: https://www.thinkwithgoogle.com/intl/en-gb/marketing-strategies/app-and-mobile/furniture-village-and-greenlight-slash-page-load-times-boosting-user-experience/
                - text: )
              - listitem [ref=e364]:
                - text: 40% faster → 15% more sign-ups (
                - link "Pinterest" [ref=e365] [cursor=pointer]:
                  - /url: https://medium.com/pinterest-engineering/driving-user-growth-with-performance-improvements-cfc50dafadd7
                - text: )
              - listitem [ref=e366]:
                - text: 850ms faster → 7% more conversions (
                - link "COOK" [ref=e367] [cursor=pointer]:
                  - /url: https://web.dev/why-speed-matters/
                - text: )
              - listitem [ref=e368]:
                - text: Every 1 second slower → 10% fewer users (
                - link "BBC" [ref=e369] [cursor=pointer]:
                  - /url: https://www.creativebloq.com/features/how-the-bbc-builds-websites-that-scale
                - text: )
            - paragraph [ref=e370]: In many web frameworks, it is easy to build a website that looks great during development only to load painfully slow once deployed. JavaScript is often the culprit, since many phones and lower-powered devices rarely match the speed of a developer’s laptop.
            - paragraph [ref=e371]:
              - text: "Astro’s magic is in how it combines the two values explained above -- a content focus with a server-first architecture -- to make tradeoffs and deliver features that other frameworks cannot. The result is amazing web performance for every website, out of the box. Our goal:"
              - strong [ref=e372]: It should be nearly impossible to build a slow website with Astro.
            - paragraph [ref=e373]:
              - text: An Astro website can
              - link "load 40% faster with 90% less JavaScript" [ref=e374] [cursor=pointer]:
                - /url: https://twitter.com/t3dotgg/status/1437195415439360003
              - text: "than the same site built with the most popular React web framework. But don’t take our word for it: watch Astro’s performance leave Ryan Carniato (creator of Solid.js and Marko)"
              - link "speechless" [ref=e375] [cursor=pointer]:
