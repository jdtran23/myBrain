        - generic [ref=e256]:
          - generic [ref=e257]:
            - paragraph [ref=e258]:
              - strong [ref=e259]: Astro
              - text: is the web framework for building
              - strong [ref=e260]: content-driven websites
              - text: like blogs, marketing, and e-commerce. Astro is best-known for pioneering a new
              - link "frontend architecture" [ref=e261] [cursor=pointer]:
