                - generic [ref=e268]: Section titled “Features”
            - paragraph [ref=e269]:
              - strong [ref=e270]: Astro is an all-in-one web framework.
              - text: It includes everything you need to create a website, built-in. There are also hundreds of different
              - link "integrations" [ref=e271] [cursor=pointer]:
