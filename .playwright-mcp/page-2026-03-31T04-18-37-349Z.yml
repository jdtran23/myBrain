              - text: The
              - code [ref=e386]: .astro
              - text: "UI language is a superset of HTML: any valid HTML is valid Astro templating syntax! So, if you can write HTML, you can write Astro components! But, it also combines some of our favorite features borrowed from other component languages like JSX expressions (React) and CSS scoping by default (Svelte and Vue). This closeness to HTML also makes it easier to use progressive enhancement and common accessibility patterns without any overhead."
            - paragraph [ref=e387]: We then made sure that you could also use your favorite UI component languages that you already know, and even reuse components you might already have. React, Preact, Svelte, Vue, Solid, and others, including web components, are all supported for authoring UI components in an Astro project.
            - paragraph [ref=e388]: Astro was designed to be less complex than other UI frameworks and languages. One big reason for this is that Astro was designed to render on the server, not in the browser. That means that you don’t need to worry about hooks (React), stale closures (also React), refs (Vue), observables (Svelte), atoms, selectors, reactions, or derivations. There is no reactivity on the server, so all of that complexity melts away.
            - paragraph [ref=e389]:
              - text: One of our favorite sayings is
              - strong [ref=e390]: opt in to complexity.
              - text: We designed Astro to remove as much “required complexity” as possible from the developer experience, especially as you onboard for the first time. You can build a “Hello World” example website in Astro with just HTML and CSS. Then, when you need to build something more powerful, you can incrementally reach for new features and APIs as you go.
            - generic [ref=e391]:
              - heading "Developer-focused" [level=3] [ref=e392]
              - link "Section titled “Developer-focused”" [ref=e393] [cursor=pointer]:
                - /url: "#developer-focused"
                - img [ref=e395]
                - generic [ref=e397]: Section titled “Developer-focused”
            - paragraph [ref=e398]: We strongly believe that Astro is only a successful project if people love using it. Astro has everything you need to support you as you build with Astro.
            - paragraph [ref=e399]: Astro invests in developer tools like a great CLI experience from the moment you open your terminal, an official VS Code extension for syntax highlighting, TypeScript and Intellisense, and documentation actively maintained by hundreds of community contributors and available in 14 languages.
            - paragraph [ref=e400]:
              - text: Our welcoming, respectful, inclusive community on Discord is ready to provide support, motivation, and encouragement. Open a
              - code [ref=e401]: "#support"
              - text: thread to get help with your project. Visit our dedicated
              - code [ref=e402]: "#showcase"
              - text: channel for sharing your Astro sites, blog posts, videos, and even work-in-progress for safe feedback and constructive criticism. Participate in regular live events such as our weekly community call, “Talking and Doc’ing,” and API/bug bashes.
            - paragraph [ref=e403]: As an open-source project, we welcome contributions of all types and sizes from community members of all experience levels. You are invited to join in roadmap discussions to shape the future of Astro, and we hope you’ll contribute fixes and features to the core codebase, compiler, docs, language tools, websites, and other projects.
