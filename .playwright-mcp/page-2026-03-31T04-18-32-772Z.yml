  - main [ref=e26]:
    - heading "Hypermedia APIs vs. Data APIs" [level=1] [ref=e27]
    - generic [ref=e28]: Carson Gross
    - time [ref=e29]: July 17, 2021
    - paragraph [ref=e30]:
      - text: A
      - emphasis [ref=e31]: hypermedia
      - text: API is an API that returns
      - link "hypermedia" [ref=e32] [cursor=pointer]:
        - /url: https://en.wikipedia.org/wiki/Hypermedia
      - text: ", typically HTML over HTTP. This style of API is distinguished from data APIs that do not return a hypermedia. The most familiar form of this latter style of API today is the ubiquitous JSON API."
    - paragraph [ref=e33]: These two different types of API have distinctly different design needs and, therefore, should use different design constraints and adopt different goals when being created.
    - paragraph [ref=e34]: "Hypermedia APIs:"
    - list [ref=e35]:
      - listitem [ref=e36]:
        - text: Will be trivially
        - link "REST-ful" [ref=e37] [cursor=pointer]:
          - /url: https://en.wikipedia.org/wiki/Representational_state_transfer
        - text: ", since they are simply what"
        - link "Roy Fielding was describing" [ref=e38] [cursor=pointer]:
          - /url: https://www.ics.uci.edu/~fielding/pubs/dissertation/rest_arch_style.htm
        - text: .
      - listitem [ref=e39]: Should be driven by the needs of the underlying hypermedia application
      - listitem [ref=e40]:
        - text: May change dramatically
        - emphasis [ref=e41]: without
        - text: versioning information, because hypermedia utilizes
        - link "self describing messages" [ref=e42] [cursor=pointer]:
          - /url: https://en.wikipedia.org/wiki/Representational_state_transfer#Uniform_interface
      - listitem [ref=e43]: Should be passed directly to humans, to maximize the flexibility of the system
    - paragraph [ref=e44]: "Data APIs, on the other hand:"
    - list [ref=e45]:
      - listitem [ref=e46]:
        - text: Will not benefit dramatically from REST-fulness, beyond perhaps
        - link "Level 2 of the Richardson Maturity Model" [ref=e47] [cursor=pointer]:
          - /url: https://en.wikipedia.org/wiki/Richardson_Maturity_Model
      - listitem [ref=e48]: Should strive for both regularity and expressiveness due to the arbitrary data needs of consumers
      - listitem [ref=e49]: Should be versioned and should be very stable within a particular version of the API
      - listitem [ref=e50]: Should be consumed by code, processed and then potentially presented to a human
    - 'heading "Anchor link for: apis-today" [level=2] [ref=e51]':
      - 'link "Anchor link for: apis-today" [ref=e52] [cursor=pointer]':
        - /url: "#apis-today"
        - text: APIs Today
    - paragraph [ref=e53]:
      - text: Today, APIs are typically thought of in terms of JSON-over-HTTP. These are almost always data-oriented APIs rather than hypermedia APIs, although occasionally hypermedia concepts are incorporated into them (typically to little benefit of the end users.) There has been a
      - link "movement away" [ref=e54] [cursor=pointer]:
        - /url: https://graphql.org/
      - text: from REST-ful APIs as the industry has begun to
      - link "recognize the problems with fitting data APIs into the REST-ful model." [ref=e55] [cursor=pointer]:
        - /url: https://kieranpotts.com/rebranding-rest/
    - paragraph [ref=e56]: "This is a good thing: the industry should question REST-ful ideas in the Data API world and begin looking at older client-server technologies that did a better job of servicing that particular network architecture, leaving REST instead to the network architecture that it was coined to describe: hypermedia APIs."
    - 'heading "Anchor link for: designing-a-hypermedia-api" [level=2] [ref=e57]':
      - 'link "Anchor link for: designing-a-hypermedia-api" [ref=e58] [cursor=pointer]':
        - /url: "#designing-a-hypermedia-api"
        - text: Designing a Hypermedia API
    - paragraph [ref=e59]:
      - text: To show how a hypermedia API might be designed differently than a data API, let’s consider the following situation, which came up on the
      - link "htmx discord" [ref=e60] [cursor=pointer]:
        - /url: /discord
      - text: "recently:"
    - blockquote [ref=e61]:
      - paragraph [ref=e62]: I want a page with a form and a table on it. The form will add new elements to the table, and the table will also be polling every 30 seconds so that updates from other users are shown.
    - paragraph [ref=e63]:
      - text: Let’s consider this UI in terms of a base url,
      - code [ref=e64]: /contacts
    - paragraph [ref=e65]:
      - text: The first thing we will need is an end point to retrieve the form and the table of current contacts. This will live at
      - code [ref=e66]: /contacts
      - text: ", giving:"
    - code [ref=e68]: GET /contacts -> render the form & contacts table
    - paragraph [ref=e69]: "Next, we want to be able to create contacts. This would be done via a POST to the same URL:"
    - code [ref=e71]: GET /contacts -> render the form & contacts table POST /contacts -> create the new contact, redirect to GET /contacts
    - paragraph [ref=e72]: "with HTML that looks something like this:"
    - code [ref=e74]: <div> <form action='/contacts' method="post"> <!-- form for adding contacts --> </form> <table> <!-- contacts table --> </table> </div>
    - paragraph [ref=e75]:
      - text: So far, so standard web 1.0 application, and thus far the data-API and hypermedia API needs haven’t diverged very much, although it is worth noteing that the hypermedia API is
      - emphasis [ref=e76]: self describing
      - text: and could be modified (say, changing the URL for creating contacts) without breaking the hypermedia application.
    - paragraph [ref=e77]:
      - text: "Now we get to the part where htmx is needed: polling the server for updates to the table occasionally. To do this we will add a new end point,"
      - code [ref=e78]: /contacts/table
      - text: ", which renders only the table of contacts:"
    - code [ref=e80]: GET /contacts -> render the form & contacts table POST /contacts -> create the new contact, redirect to GET /contacts GET /contacts/table -> render the contacts table
    - paragraph [ref=e81]: "and then add a poll trigger to the table:"
    - code [ref=e83]: <div> <form action='/contacts' method="post"> <!-- form for adding contacts --> </form> <table hx-trigger="every 30s" hx-get="/contacts/table" hx-swap="outerHTML"> <!-- contacts table --> </table> </div>
    - paragraph [ref=e84]: Here we see the hypermedia API and data API begin to diverge. This new end point is driven entirely by hypermedia needs, not data model needs. This end point can go away if the hypermedia needs of the application change; its form may change dramatically and so on, which is entirely acceptable since the system is self-describing.
    - paragraph [ref=e85]: "Since we have updated the HTML to use htmx for polling, we may as well make the form use htmx as well for a better UX experience:"
    - code [ref=e87]: <div> <form action='/contacts' method="post" hx-boost="true"> <!-- form for adding contacts --> </form> <table hx-trigger="every 30s" hx-get="/contacts/table" hx-swap="outerHTML"> <!-- contacts table --> </table> </div>
    - paragraph [ref=e88]:
      - text: We can, if we choose, add additional end points for things like server-side validation of inputs, dynamic forms and so forth. These end points would be driven by
      - emphasis [ref=e89]: hypermedia needs
      - text: "rather than any sort of data model considerations: we think in terms of what we are trying to achieve with our application."
    - 'heading "Anchor link for: api-churn" [level=2] [ref=e90]':
      - 'link "Anchor link for: api-churn" [ref=e91] [cursor=pointer]':
        - /url: "#api-churn"
        - text: API Churn
    - paragraph [ref=e92]:
      - text: "The crux point of this short essay is this: API churn is fine in a hypermedia system because"
      - emphasis [ref=e93]: the messages in a hypermedia system are self-describing
      - text: ". We can thrash the API around and the application doesn’t break: human users simply see the new hypermedia (HTML) and select what actions they want to do."
    - paragraph [ref=e94]:
      - text: Humans, compared with computers, are
      - link "good at deciding what to do" [ref=e95] [cursor=pointer]:
        - /url: https://intercoolerjs.org/2016/05/08/hatoeas-is-for-humans.html
      - text: and are reasonably OK with change.
    - paragraph [ref=e96]: This is in contrast with data APIs. Data APIs cannot be modified without breaking client code and thus must be much more disciplined in their changes. Data APIs also face pressure to provide higher levels of expressiveness so that they can satisfy more client needs without modification.
    - complementary [ref=e97]:
      - paragraph [ref=e98]:
        - emphasis [ref=e99]:
          - text: This latter situation is
          - link "especially dangerous" [ref=e100] [cursor=pointer]:
            - /url: https://intercoolerjs.org/2016/02/17/api-churn-vs-security.html
          - text: when these data APIs are consumed in a browser, because any data-api expressiveness available to a front-end developer is also available to a potentially hostile user, who can fire up a console and begin hammering away at the API. Apparently, facebook uses a
          - link "whitelist" [ref=e101] [cursor=pointer]:
            - /url: https://twitter.com/AdamChainz/status/1392162996844212232
          - text: to deal with this.
      - paragraph [ref=e102]:
        - emphasis [ref=e103]: Do you?
    - 'heading "Anchor link for: conclusion" [level=2] [ref=e104]':
      - 'link "Anchor link for: conclusion" [ref=e105] [cursor=pointer]':
        - /url: "#conclusion"
        - text: Conclusion
    - paragraph [ref=e106]: When designing a hypermedia API, you should use a different design mindset than you use for data APIs. Churn is much less of a concern, and providing the end points you need for a good hypermedia experience should be your primary goal.
